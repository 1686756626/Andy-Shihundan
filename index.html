<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Andy 的石鸡蛋 🥚</title>
    <meta name="theme-color" content="#f59e0b">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🥚</text></svg>">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Noto Sans SC', sans-serif;
            background: #0f0f1a;
            color: #e5e7eb;
            min-height: 100vh;
        }

        /* ===== Navigation ===== */
        .nav {
            position: fixed; top: 0; left: 0; right: 0; z-index: 100;
            background: rgba(15,15,26,0.85);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255,255,255,0.06);
            display: flex; align-items: center; justify-content: center;
            padding: 0 24px; height: 60px;
        }
        .nav-logo {
            font-size: 20px; font-weight: 700; color: #fbbf24;
            display: flex; align-items: center; gap: 8px;
            position: absolute; left: 24px;
        }
        .nav-tabs {
            display: flex; gap: 4px;
            background: rgba(255,255,255,0.05);
            border-radius: 10px; padding: 4px;
        }
        .nav-tab {
            padding: 8px 24px; border-radius: 8px; border: none;
            background: transparent; color: #9ca3af; cursor: pointer;
            font-size: 14px; font-weight: 500; transition: all 0.2s;
            text-decoration: none;
        }
        .nav-tab:hover { color: #e5e7eb; }
        .nav-tab.active {
            background: linear-gradient(135deg, #f59e0b, #d97706);
            color: #0f0f1a; font-weight: 600;
        }

        /* ===== Content ===== */
        #content {
            padding-top: 60px;
            min-height: 100vh;
        }

        /* ===== 丑事墙 ===== */
        .shame-hero {
            text-align: center; padding: 60px 24px 40px;
            background: linear-gradient(180deg, rgba(245,158,11,0.08) 0%, transparent 100%);
        }
        .shame-hero h1 {
            font-size: 48px; font-weight: 800;
            background: linear-gradient(135deg, #fbbf24, #f59e0b, #ef4444);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .shame-hero p { margin-top: 12px; color: #9ca3af; font-size: 16px; }
        .shame-counter {
            margin-top: 20px; display: inline-flex; align-items: center; gap: 8px;
            background: rgba(245,158,11,0.1); border: 1px solid rgba(245,158,11,0.2);
            padding: 8px 20px; border-radius: 999px; font-size: 14px; color: #fbbf24;
        }
        .shame-counter span { font-size: 24px; font-weight: 800; }

        .shame-wall {
            max-width: 800px; margin: 0 auto; padding: 0 24px 60px;
            display: flex; flex-direction: column; gap: 16px;
        }
        .shame-card {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 16px; padding: 24px;
            transition: all 0.2s; position: relative; overflow: hidden;
        }
        .shame-card::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
            background: linear-gradient(90deg, #fbbf24, #ef4444);
        }
        .shame-card:hover {
            border-color: rgba(245,158,11,0.2);
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(245,158,11,0.08);
        }
        .shame-card .shame-header {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 12px;
        }
        .shame-card .shame-tag {
            display: inline-flex; align-items: center; gap: 6px;
            background: rgba(245,158,11,0.12); color: #fbbf24;
            padding: 4px 12px; border-radius: 999px; font-size: 12px; font-weight: 600;
        }
        .shame-card .shame-date { font-size: 13px; color: #6b7280; }
        .shame-card .shame-text { font-size: 16px; line-height: 1.7; color: #d1d5db; }
        .shame-card .shame-footer { margin-top: 16px; display: flex; align-items: center; gap: 8px; }
        .shame-card .shame-footer .witness {
            font-size: 12px; color: #6b7280;
            background: rgba(255,255,255,0.04); padding: 4px 10px; border-radius: 6px;
        }

        /* ===== Chat Layout ===== */
        .chat-layout {
            display: flex;
            height: calc(100vh - 60px);
            overflow: hidden;
        }

        /* ===== Chat Sidebar ===== */
        .chat-sidebar {
            width: 260px; background: rgba(255,255,255,0.02);
            border-right: 1px solid rgba(255,255,255,0.06);
            display: flex; flex-direction: column; flex-shrink: 0;
            transition: transform 0.25s ease, opacity 0.25s ease;
        }
        .sidebar-header {
            padding: 16px; display: flex; gap: 8px; align-items: center;
        }
        .sidebar-new-btn {
            flex: 1; padding: 10px; border-radius: 10px; border: 1px solid rgba(245,158,11,0.3);
            background: rgba(245,158,11,0.08); color: #fbbf24;
            font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.2s;
        }
        .sidebar-new-btn:hover { background: rgba(245,158,11,0.15); }
        .sidebar-toggle-btn {
            width: 32px; height: 32px; border-radius: 8px; border: none;
            background: rgba(255,255,255,0.05); color: #9ca3af; cursor: pointer;
            font-size: 14px; display: none; align-items: center; justify-content: center;
        }
        .sidebar-list {
            flex: 1; overflow-y: auto; padding: 0 8px 16px;
            display: flex; flex-direction: column; gap: 2px;
        }
        .sidebar-item {
            display: flex; align-items: center; gap: 8px;
            padding: 10px 12px; border-radius: 10px; cursor: pointer;
            transition: all 0.15s; position: relative;
        }
        .sidebar-item:hover { background: rgba(255,255,255,0.05); }
        .sidebar-item.active { background: rgba(245,158,11,0.1); }
        .sidebar-item-title {
            flex: 1; font-size: 13px; color: #d1d5db;
            overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
        }
        .sidebar-item.active .sidebar-item-title { color: #fbbf24; font-weight: 500; }
        .sidebar-item-del {
            opacity: 0; width: 24px; height: 24px; border: none;
            background: rgba(255,255,255,0.05); color: #6b7280; border-radius: 6px;
            cursor: pointer; font-size: 11px; display: flex; align-items: center; justify-content: center;
            transition: all 0.15s; flex-shrink: 0;
        }
        .sidebar-item:hover .sidebar-item-del { opacity: 1; }
        .sidebar-item-del:hover { color: #ef4444; background: rgba(239,68,68,0.1); }

        /* ===== Chat Main ===== */
        .chat-main {
            flex: 1; display: flex; flex-direction: column; min-width: 0;
        }
        .chat-toolbar {
            display: flex; align-items: center; justify-content: center;
            padding: 12px 24px; position: relative;
            border-bottom: 1px solid rgba(255,255,255,0.04);
        }
        .chat-toolbar-title { font-size: 14px; font-weight: 600; color: #fbbf24; }
        .toolbar-menu-btn {
            position: absolute; left: 16px; width: 36px; height: 36px;
            border-radius: 10px; border: 1px solid rgba(255,255,255,0.1);
            background: rgba(255,255,255,0.04); color: #e5e7eb;
            font-size: 16px; cursor: pointer; display: none;
            align-items: center; justify-content: center; transition: all 0.2s;
        }
        .toolbar-menu-btn:hover { background: rgba(255,255,255,0.08); }
        .chat-clear-btn {
            position: absolute; right: 24px;
            background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1);
            color: #9ca3af; font-size: 14px; padding: 6px 10px; line-height: 1;
            border-radius: 8px; cursor: pointer; transition: all 0.2s;
        }
        .chat-clear-btn:hover { color: #ef4444; border-color: rgba(239,68,68,0.3); }

        /* ===== Chat Body ===== */
        .chat-body {
            flex: 1; display: flex; flex-direction: column; overflow: hidden;
        }
        .chat-welcome {
            flex: 1; display: flex; align-items: center; justify-content: center;
            flex-direction: column; gap: 16px; padding: 24px;
        }
        .chat-welcome .emoji { font-size: 64px; }
        .chat-welcome h2 { font-size: 24px; font-weight: 700; color: #fbbf24; }
        .chat-welcome p { color: #9ca3af; text-align: center; max-width: 400px; line-height: 1.6; }

        /* Quick Questions */
        .quick-questions {
            display: flex; flex-wrap: wrap; gap: 8px; justify-content: center;
            margin-top: 12px; max-width: 480px;
        }
        .qq-btn {
            padding: 8px 16px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1);
            background: rgba(255,255,255,0.04); color: #d1d5db;
            font-size: 13px; cursor: pointer; transition: all 0.2s;
        }
        .qq-btn:hover {
            border-color: rgba(245,158,11,0.4); color: #fbbf24;
            background: rgba(245,158,11,0.06);
        }

        .chat-messages {
            flex: 1; overflow-y: auto; padding: 24px;
            display: flex; flex-direction: column; gap: 16px;
            max-width: 800px; margin: 0 auto; width: 100%;
        }
        .chat-messages:empty { display: none; }

        /* ===== Chat Messages ===== */
        .chat-msg { max-width: 85%; animation: fadeIn 0.2s; position: relative; }
        .chat-msg.user { align-self: flex-end; }
        .chat-msg.ai { align-self: flex-start; }
        .chat-msg .bubble {
            padding: 12px 16px; border-radius: 16px; font-size: 14px;
            line-height: 1.7; word-break: break-word;
        }
        .chat-msg.user .bubble {
            background: linear-gradient(135deg, #f59e0b, #d97706);
            color: #0f0f1a; font-weight: 500; border-bottom-right-radius: 4px;
        }
        .chat-msg.ai .bubble {
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.08);
            color: #e5e7eb; border-bottom-left-radius: 4px;
        }
        .chat-msg.user .bubble { white-space: pre-wrap; }

        /* Message Actions */
        .msg-actions {
            display: flex; gap: 4px; margin-top: 4px; padding-left: 4px;
            opacity: 0; transition: opacity 0.15s;
        }
        .chat-msg:hover .msg-actions { opacity: 1; }
        .msg-actions button {
            padding: 2px 8px; border-radius: 6px; border: none;
            background: rgba(255,255,255,0.05); color: #6b7280;
            font-size: 11px; cursor: pointer; transition: all 0.15s;
        }
        .msg-actions button:hover { color: #d1d5db; background: rgba(255,255,255,0.1); }

        /* Typing Cursor */
        .typing-cursor {
            color: #fbbf24;
            animation: blink 0.8s step-end infinite;
        }
        @keyframes blink {
            50% { opacity: 0; }
        }

        /* ===== Markdown Styles (in AI bubbles) ===== */
        .md-code-block {
            margin: 8px 0; border-radius: 10px; overflow: hidden;
            background: #1a1a2e; border: 1px solid rgba(255,255,255,0.08);
        }
        .md-code-header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 6px 12px; background: rgba(255,255,255,0.04);
            font-size: 11px; color: #6b7280;
        }
        .md-copy-btn {
            padding: 2px 8px; border-radius: 4px; border: none;
            background: rgba(255,255,255,0.08); color: #9ca3af;
            font-size: 11px; cursor: pointer; transition: all 0.15s;
        }
        .md-copy-btn:hover { background: rgba(255,255,255,0.15); color: #e5e7eb; }
        .md-code-block pre {
            margin: 0; padding: 12px; overflow-x: auto;
            font-size: 13px; line-height: 1.5; font-family: 'SF Mono', 'Fira Code', monospace;
        }
        .md-code-block code { color: #e5e7eb; }
        .md-inline-code {
            padding: 2px 6px; border-radius: 4px;
            background: rgba(255,255,255,0.08); font-size: 13px;
            font-family: 'SF Mono', 'Fira Code', monospace; color: #fbbf24;
        }
        .md-quote {
            border-left: 3px solid #f59e0b; padding: 4px 12px; margin: 8px 0;
            color: #9ca3af; font-style: italic;
        }
        .md-h1 { font-size: 20px; font-weight: 700; margin: 12px 0 8px; color: #fbbf24; }
        .md-h2 { font-size: 17px; font-weight: 700; margin: 10px 0 6px; color: #fbbf24; }
        .md-h3 { font-size: 15px; font-weight: 600; margin: 8px 0 4px; color: #fbbf24; }
        .md-ul { margin: 6px 0; padding-left: 20px; }
        .md-ol { margin: 6px 0; padding-left: 20px; }
        .md-li, .md-li-ol { margin: 2px 0; }
        .chat-msg.ai .bubble a { color: #fbbf24; text-decoration: underline; }

        /* ===== Input Area ===== */
        .chat-input-area {
            padding: 12px 24px 20px;
            border-top: 1px solid rgba(255,255,255,0.06);
        }
        .chat-file-preview {
            display: none; flex-wrap: wrap; gap: 8px;
            margin-bottom: 10px; padding: 0 4px;
        }
        .file-item {
            display: flex; align-items: center; gap: 8px;
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px; padding: 6px 10px; position: relative; max-width: 200px;
        }
        .file-item.file-img {
            max-width: 120px; flex-direction: column; padding: 6px;
        }
        .file-item.file-img img {
            width: 80px; height: 60px; object-fit: cover; border-radius: 6px;
        }
        .file-icon { font-size: 20px; flex-shrink: 0; }
        .file-info {
            display: flex; flex-direction: column; min-width: 0;
        }
        .file-info span:first-child {
            font-size: 12px; color: #e5e7eb;
            overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
        }
        .file-info span:last-child { font-size: 10px; color: #6b7280; }
        .file-remove {
            position: absolute; top: -6px; right: -6px;
            width: 18px; height: 18px; border-radius: 50%; border: none;
            background: #ef4444; color: white; font-size: 10px;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            line-height: 1; padding: 0;
        }
        .chat-input-wrap {
            max-width: 800px; margin: 0 auto;
            display: flex; gap: 8px; align-items: flex-end;
        }
        .chat-attach-btn {
            width: 44px; height: 44px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1);
            background: rgba(255,255,255,0.04); color: #9ca3af;
            font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center;
            transition: all 0.2s; flex-shrink: 0;
        }
        .chat-attach-btn:hover { color: #fbbf24; border-color: rgba(245,158,11,0.3); }
        .chat-input-wrap textarea {
            flex: 1; resize: none; border: 1px solid rgba(255,255,255,0.1);
            background: rgba(255,255,255,0.04); color: #e5e7eb;
            border-radius: 14px; padding: 12px 16px; font-size: 14px;
            font-family: inherit; line-height: 1.5;
            min-height: 48px; max-height: 120px;
            outline: none; transition: border-color 0.2s;
        }
        .chat-input-wrap textarea:focus { border-color: rgba(245,158,11,0.4); }
        .chat-input-wrap textarea::placeholder { color: #6b7280; }
        .chat-send-btn {
            width: 48px; height: 48px; border-radius: 14px; border: none;
            background: linear-gradient(135deg, #f59e0b, #d97706);
            color: #0f0f1a; cursor: pointer; font-size: 18px;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.2s; flex-shrink: 0;
        }
        .chat-send-btn:hover { transform: scale(1.05); }
        .chat-send-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

        /* ===== Drag & Drop Overlay ===== */
        .chat-body.drag-over::after {
            content: '📎 松开上传文件';
            position: absolute; inset: 0; z-index: 10;
            display: flex; align-items: center; justify-content: center;
            background: rgba(15,15,26,0.85); border: 2px dashed #f59e0b;
            border-radius: 12px; margin: 12px;
            font-size: 18px; color: #fbbf24; font-weight: 600;
            pointer-events: none;
        }
        .chat-body { position: relative; }

        /* ===== Message Images & Files ===== */
        .msg-image { margin-bottom: 8px; }
        .msg-image img {
            max-width: 260px; max-height: 200px; border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .msg-file-badge {
            display: inline-flex; align-items: center; gap: 6px;
            background: rgba(255,255,255,0.08); padding: 4px 10px;
            border-radius: 6px; font-size: 12px; color: #d1d5db; margin-bottom: 4px;
        }

        /* ===== Animations ===== */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ===== Mobile ===== */
        @media (max-width: 768px) {
            .chat-sidebar {
                position: fixed; top: 60px; left: 0; bottom: 0;
                z-index: 50; background: #0f0f1a;
                transform: translateX(-100%); opacity: 0; pointer-events: none;
                width: 280px;
            }
            .chat-sidebar.open { transform: translateX(0); opacity: 1; pointer-events: all; }
            .sidebar-toggle-btn { display: flex; }
            .toolbar-menu-btn { display: flex; }
            .chat-msg { max-width: 92%; }
            .quick-questions { flex-direction: column; align-items: stretch; }
            .qq-btn { text-align: center; }
        }

        @media (max-width: 640px) {
            .shame-hero h1 { font-size: 32px; }
            .nav-logo { display: none; }
            .nav-tab { padding: 8px 16px; font-size: 13px; }
            .chat-input-area { padding: 10px 12px 16px; }
            .chat-messages { padding: 16px 12px; }
        }
    </style>
</head>
<body>

    <!-- Navigation -->
    <nav class="nav">
        <div class="nav-logo">🥚 Andy 的石鸡蛋</div>
        <div class="nav-tabs">
            <a class="nav-tab active" data-page="shame" href="#shame">🤡 丑事墙</a>
            <a class="nav-tab" data-page="chat" href="#chat">🤖 AI 聊天</a>
        </div>
    </nav>

    <!-- Content -->
    <div id="content"></div>

    <!-- JS 加载顺序：mammoth → config → utils → app → pages -->
    <script src="https://cdn.jsdelivr.net/npm/mammoth@1.8.0/mammoth.browser.min.js"></script>
    <script src="config.js?v=2"></script>
    <script src="utils.js?v=2"></script>
    <script src="app.js?v=1"></script>
    <script src="pages/shame.js?v=1"></script>
    <script src="pages/chat.js?v=7"></script>
</body>
</html>
